<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}TravelWise{% endblock %}</title>

    <!-- Google Fonts (Plus Jakarta Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        :root {
            --font-primary: 'Plus Jakarta Sans', sans-serif;
            --primary: #2563EB;
            --secondary: #1E40AF;
            --accent: #38BDF8;
            --dark: #0F172A;
            --surface: #FFFFFF;
            --background: #EEF4FB;
            --section: #F8FAFC;
            --primary-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            --primary-hover-gradient: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
            --card-border-radius: 18px;
            --btn-border-radius: 18px;
            --box-shadow-premium: 0 12px 40px rgba(15, 23, 42, 0.08);
            --box-shadow-hover: 0 20px 48px rgba(15, 23, 42, 0.15);
        }

        body {
            font-family: var(--font-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(180deg, #eef4fb 0%, #e7eef7 100%) !important;
            color: #1e293b;
        }

        /* Reusable Card Overrides */
        .card {
            border: 1px solid rgba(15, 23, 42, 0.05) !important;
            border-radius: var(--card-border-radius) !important;
            box-shadow: var(--box-shadow-premium) !important;
            background-color: var(--surface) !important;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
            overflow: hidden;
        }

        .card-hover:hover, .card:hover {
            transform: translateY(-6px) !important;
            box-shadow: var(--box-shadow-hover) !important;
        }

        /* Button Styling Overrides */
        .btn {
            border-radius: var(--btn-border-radius) !important;
            font-weight: 600 !important;
            font-size: 0.9rem !important;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1) !important;
        }

        .btn-primary {
            background: var(--primary-gradient) !important;
            border: none !important;
            color: #ffffff !important;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2) !important;
        }

        .btn-primary:hover, .btn-primary:focus {
            background: var(--primary-hover-gradient) !important;
            transform: scale(1.03) translateY(-2px) !important;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.4) !important;
        }

        .btn-outline-primary {
            border: 1.5px solid #2563eb !important;
            color: #2563eb !important;
        }

        .btn-outline-primary:hover {
            background: var(--primary-gradient) !important;
            color: #ffffff !important;
            border-color: transparent !important;
            transform: scale(1.03) translateY(-2px) !important;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.25) !important;
        }

        /* Forms Styling Overrides */
        .form-control, .form-select, .form-textarea {
            border: 1.5px solid #cbd5e1 !important;
            border-radius: var(--btn-border-radius) !important;
            padding: 0.65rem 1.1rem !important;
            font-size: 0.95rem !important;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1) !important;
            background-color: #ffffff !important;
            color: #1e293b !important;
        }

        .form-control:focus, .form-select:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12) !important;
            outline: 0 !important;
        }

        .form-label {
            font-weight: 600 !important;
            color: #475569 !important;
            font-size: 0.875rem !important;
            margin-bottom: 0.4rem !important;
        }

        /* Glassmorphism utility */
        .glass-morphic {
            background: rgba(255, 255, 255, 0.95) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.5) !important;
        }

        /* Global Shadows and Borders overrides */
        .shadow-sm {
            box-shadow: var(--box-shadow-premium) !important;
        }
        .rounded-3 {
            border-radius: 12px !important;
        }
        .rounded-4 {
            border-radius: 16px !important;
        }

        /* Transition and Hover Animations */
        .btn, .card, .nav-link, .card-img-top {
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn:hover {
            transform: translateY(-1px);
        }
        .btn:active {
            transform: translateY(1px);
        }

        /* Navbar Design System Overrides */
        .navbar-premium {
            background-color: rgba(15, 23, 42, 0.85) !important;
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            padding: 0.8rem 0 !important;
            transition: all 0.3s ease-in-out !important;
        }
        .navbar-premium .navbar-brand {
            font-weight: 800 !important;
            letter-spacing: -0.03em !important;
            color: #ffffff !important;
        }
        .navbar-premium .nav-link {
            color: #94a3b8 !important;
            font-weight: 600 !important;
            font-size: 0.9rem !important;
            padding: 0.6rem 1rem !important;
            position: relative;
            transition: color 0.25s ease !important;
        }
        .navbar-premium .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 2px;
            left: 1rem;
            background-color: #3b82f6;
            transition: width 0.25s ease;
        }
        .navbar-premium .nav-link:hover::after, .navbar-premium .nav-link.active::after {
            width: calc(100% - 2rem);
        }
        .navbar-premium .nav-link:hover, .navbar-premium .nav-link.active {
            color: #ffffff !important;
        }
        .navbar-premium .navbar-toggler {
            border: 1px solid #334155 !important;
            padding: 0.4rem 0.6rem !important;
        }
        .navbar-premium .navbar-toggler:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25) !important;
        }

        /* Footer Design System Overrides */
        .footer-premium {
            background-color: #ffffff !important;
            border-top: 1px solid #e2e8f0 !important;
            padding: 5rem 0 3rem 0 !important;
        }
        .footer-premium h5, .footer-premium h6 {
            font-weight: 700 !important;
            letter-spacing: -0.02em !important;
            color: #0f172a !important;
        }
        .footer-premium .footer-link {
            color: #64748b !important;
            font-weight: 500 !important;
            font-size: 0.9rem !important;
            transition: color 0.2s ease-in-out !important;
            text-decoration: none !important;
        }
        .footer-premium .footer-link:hover {
            color: #2563eb !important;
        }
    </style>

    <!-- Custom CSS Block -->
    {% block extra_css %}{% endblock %}
</head>
<body>

    {% include 'includes/navbar.html' %}

    {% include 'includes/messages.html' %}

    <main class="flex-grow-1">
        <!-- Content Block -->
        {% block content %}
        {% endblock %}
    </main>

    {% include 'includes/footer.html' %}

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- Custom JS Block -->
    {% block extra_js %}{% endblock %}
</body>
</html>
