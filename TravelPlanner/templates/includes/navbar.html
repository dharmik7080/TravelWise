<nav class="navbar navbar-expand-lg navbar-dark navbar-premium sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
            <i class="fa-solid fa-compass me-2"></i>TravelWise
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' or request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'home' %}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/destinations/' in request.path %}active{% endif %}" href="{% url 'destinations:list' %}">Destinations</a>
                </li>
                {% if user.is_authenticated %}
                <li class="nav-item">
                    <a class="nav-link {% if '/dashboard/' in request.path %}active{% endif %}" href="{% url 'dashboard:index' %}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if '/trips/' in request.path %}active{% endif %}" href="{% url 'trips:index' %}">My Trips</a>
                </li>
                {% endif %}
            </ul>
            <ul class="navbar-nav align-items-lg-center">
                {% if user.is_authenticated %}
                <li class="nav-item">
                    <a class="nav-link {% if '/profile/' in request.path %}active{% endif %}" href="{% url 'accounts:profile' %}"><i class="fa-regular fa-user me-1"></i>Profile</a>
                </li>
                <li class="nav-item ms-lg-2">
                    <form method="post" action="{% url 'accounts:logout' %}" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="nav-link btn btn-link text-start text-lg-center border-0" style="text-decoration: none; background: none; box-shadow: none; padding: .5rem 1rem;"><i class="fa-solid fa-arrow-right-from-bracket me-1"></i>Logout</button>
                    </form>
                </li>
                {% else %}
                <li class="nav-item">
                    <a class="nav-link {% if '/login/' in request.path %}active{% endif %}" href="{% url 'accounts:login' %}">Login</a>
                </li>
                <li class="nav-item ms-lg-2">
                    <a class="btn btn-primary btn-sm px-3 my-2 my-lg-0 w-100 w-lg-auto" href="{% url 'accounts:register' %}">Register</a>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>
