{% extends 'base.html' %}
{% block title %}Password Reset Complete | TravelPlanner{% endblock %}

{% block content %}
<div class="container py-5 flex-grow-1 d-flex align-items-center">
    <div class="row justify-content-center w-100 m-0">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 my-5 text-center">
                <div class="card-body p-4 p-md-5">
                    <div class="mb-4">
                        <i class="fa-solid fa-circle-check fa-3x text-success"></i>
                    </div>
                    <h2 class="fw-bold text-dark mb-3">Password Updated</h2>
                    <p class="text-muted mb-4">Your password has been set successfully. You can now use your new password to sign in to your account.</p>
                    <hr>
                    <div class="d-grid mt-4">
                        <a href="{% url 'accounts:login' %}" class="btn btn-primary py-2.5 fw-semibold"><i class="fa-solid fa-arrow-right-to-bracket me-2"></i>Sign In</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
